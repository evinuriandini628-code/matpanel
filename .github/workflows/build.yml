name: Build & Deploy matpanel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install yarn
        run: npm install -g yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Build production
        run: yarn build:production

      - name: Deploy ke VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "public/*"
          target: "/tmp/matpanel-dist/"
          strip_components: 1

      - name: Apply ke Pterodactyl
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            echo "=== Backup public lama ==="
            cp -r /var/www/pterodactyl/public /var/www/pterodactyl/public.bak.$(date +%Y%m%d%H%M%S)
            echo "=== Apply dist baru ==="
            rsync -av --delete /tmp/matpanel-dist/ /var/www/pterodactyl/public/
            echo "=== Fix permission ==="
            chown -R www-data:www-data /var/www/pterodactyl/public
            chmod -R 755 /var/www/pterodactyl/public
            echo "=== Cleanup ==="
            rm -rf /tmp/matpanel-dist
            echo "=== DONE ==="
